<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded rectangle matching the background from the uploaded logo image -->
  <rect width="120" height="120" rx="28" fill="#1e2022" />
  
  <!-- Outer Star Peaks -->
  <!-- Top point of A -->
  <path d="M 60,20 L 68,36 L 52,36 Z" fill="#00E5FF" />
  <!-- Bottom point -->
  <path d="M 60,100 L 52,84 L 68,84 Z" fill="#00E5FF" />
  <!-- Left point -->
  <path d="M 20,60 L 36,52 L 36,68 Z" fill="#00E5FF" />
  <!-- Right point -->
  <path d="M 100,60 L 84,52 L 84,68 Z" fill="#00E5FF" />

  <!-- Central Star Frame Outer Segments -->
  <path d="M 52,36 L 36,52" stroke="#00E5FF" stroke-width="3" stroke-linecap="round" />
  <path d="M 84,52 L 68,36" stroke="#00E5FF" stroke-width="3" stroke-linecap="round" />
  <path d="M 36,68 L 52,84" stroke="#00E5FF" stroke-width="3" stroke-linecap="round" />
  <path d="M 68,84 L 84,68" stroke="#00E5FF" stroke-width="3" stroke-linecap="round" />

  <!-- The 'A' Letter Structure -->
  <!-- Left slanted leg -->
  <path d="M 52,36 L 38,82" stroke="#00E5FF" stroke-width="6" stroke-linecap="round" />
  <!-- Crossbar -->
  <path d="M 44,64 L 60,64" stroke="#00E5FF" stroke-width="5" stroke-linecap="round" />

  <!-- The 'B' Letter Structure -->
  <!-- Main vertical stem (shared with right leg of A) -->
  <path d="M 60,36 L 60,84" stroke="#00E5FF" stroke-width="6" stroke-linecap="round" />
  <!-- B's top loop -->
  <path d="M 60,42 C 77,42 79,58 60,60" stroke="#00E5FF" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" />
  <!-- B's bottom loop -->
  <path d="M 60,60 C 81,60 83,80 60,82" stroke="#00E5FF" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" />
</svg>
